<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Reader</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/github-markdown.css">
</head>
<body data-theme="light">
    <div class="app-container">
        <!-- 大纲侧边栏 -->
        <aside class="outline-sidebar" id="outlineSidebar">
            <div class="outline-header">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                        <path d="M4 6h16M4 12h16M4 18h7"/>
                    </svg>
                    大纲
                </h3>
                <button class="close-outline-btn" id="closeOutlineBtn" title="隐藏大纲">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/>
                    </svg>
                </button>
            </div>
            <div class="outline-content" id="outlineContent">
                <!-- 大纲内容将在这里动态生成 -->
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content" id="mainContent">
            <!-- 顶部工具栏 -->
            <header class="toolbar">
                <button class="toolbar-btn" id="toggleOutlineBtn" title="切换大纲">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="toolbar-title" id="toolbarTitle">Loading...</div>
                <div class="toolbar-actions">
                    <button class="toolbar-btn" id="themeToggleBtn" title="切换主题">
                        <!-- 太阳图标 -->
                        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Markdown 内容 -->
            <div class="markdown-body" id="markdownContent">
                <div class="loading">正在加载...</div>
            </div>
        </main>
    </div>

    <!-- 引入核心库 -->
    <script src="js/marked.min.js"></script>
    
    <!-- 引入主逻辑 -->
    <script src="js/viewer.js"></script>
</body>
</html>
