<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #24292f;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .header img {
            width: 48px;
            height: 48px;
        }
        
        .header h1 {
            font-size: 16px;
            margin: 0;
            color: #24292f;
        }
        
        .header p {
            font-size: 12px;
            color: #57606a;
            margin: 4px 0 0 0;
        }
        
        .section {
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #57606a;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }
        
        .toggle-label {
            color: #24292f;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #0969da;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        
        .info {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #57606a;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        /* 更新状态区域 */
        .update-status {
            background: #ddf4ff;
            border: 1px solid #b6e3ff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            display: none;
        }
        
        .update-status.visible {
            display: block;
        }
        
        .update-status.error {
            background: #ffebe9;
            border-color: #ffdcd7;
        }
        
        .update-status.success {
            background: #dafbe1;
            border-color: #aceebb;
        }
        
        .update-status-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .update-status-text {
            font-size: 12px;
            color: #57606a;
        }
        
        .update-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .btn {
            padding: 6px 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background: #f6f8fa;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #f3f4f6;
        }
        
        .btn-primary {
            background: #0969da;
            color: white;
            border-color: #0969da;
        }
        
        .btn-primary:hover {
            background: #0550ae;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 状态指示器 */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #57606a;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1a7f37;
        }
        
        .status-dot.updating {
            background: #9a6700;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.error {
            background: #cf222e;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 版本信息 */
        .version-info {
            font-size: 11px;
            color: #8c959f;
            margin-top: 4px;
        }
        
        .footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #d0d7de;
            text-align: center;
            font-size: 11px;
            color: #8c959f;
        }
        
        /* 模式选择器 */
        .mode-selector {
            display: flex;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 6px 0;
            border: none;
            background: #f6f8fa;
            font-size: 13px;
            color: #57606a;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .mode-btn:not(:last-child) {
            border-right: 1px solid #d0d7de;
        }

        .mode-btn.active {
            background: #0969da;
            color: #fff;
            font-weight: 600;
        }

        .mode-btn:hover:not(.active) {
            background: #eaeef2;
        }

        /* 高级设置 */
        .advanced-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
            color: #0969da;
            font-size: 12px;
        }
        
        .advanced-toggle:hover {
            text-decoration: underline;
        }
        
        .advanced-settings {
            display: none;
            padding-top: 8px;
        }
        
        .advanced-settings.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon48.png" alt="Markdown Reader">
        <div>
            <h1>Markdown Reader</h1>
            <p>优雅的 Markdown 阅读器</p>
        </div>
    </div>    
    <!-- 更新状态 -->
    <div id="updateStatus" class="update-status">
        <div class="update-status-title">
            <span id="updateIcon">📦</span>
            <span id="updateTitle">检查更新中...</span>
        </div>
        <div class="update-status-text" id="updateText">正在检查 marked.js 的最新版本...</div>
        <div class="update-actions" id="updateActions">
            <button class="btn btn-primary" id="updateBtn">立即更新</button>
            <button class="btn" id="ignoreUpdateBtn">忽略</button>
        </div>
    </div>    
    <div class="section">
        <div class="section-title">
            设置
            <span class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">正常</span>
            </span>
        </div>

        <div class="section-title" style="margin-top:4px;">打开模式</div>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="auto">自动</button>
            <button class="mode-btn" data-mode="ask">询问</button>
            <button class="mode-btn" data-mode="off">关闭</button>
        </div>

        <div class="toggle-group">
            <span class="toggle-label">显示大纲</span>
            <label class="toggle-switch">
                <input type="checkbox" id="outlineToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="toggle-group">
            <span class="toggle-label">暗色主题</span>
            <label class="toggle-switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="toggle-group">
            <span class="toggle-label">自动更新</span>
            <label class="toggle-switch">
                <input type="checkbox" id="autoUpdateToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>    
    <div class="section">
        <div class="advanced-toggle" id="advancedToggle">
            <span>高级设置</span>
            <span id="advancedArrow">▼</span>
        </div>
        
        <div class="advanced-settings" id="advancedSettings">
            <div class="toggle-group">
                <span class="toggle-label">大纲滚动同步</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="scrollSyncToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div style="margin-top: 12px;">
                <button class="btn" id="checkUpdateBtn" style="width: 100%;">检查更新</button>
            </div>
            
            <div style="margin-top: 8px;">
                <button class="btn" id="resetConfigBtn" style="width: 100%;">重置配置</button>
            </div>
        </div>
    </div>    
    <div class="info">
        访问任意 .md 或 .markdown 文件，插件会自动启用 Markdown 阅读器。
    </div>    
    <div class="footer">
        <div>Markdown Reader v1.1.0</div>
        <div class="version-info" id="markedVersion">marked.js: 检查中...</div>
    </div>    
    <script>
        // 状态管理
        const state = {
            isChecking: false,
            updateAvailable: false,
            markedVersion: null
        };
        
        // DOM 元素
        const elements = {
            updateStatus: document.getElementById('updateStatus'),
            updateTitle: document.getElementById('updateTitle'),
            updateText: document.getElementById('updateText'),
            updateIcon: document.getElementById('updateIcon'),
            updateActions: document.getElementById('updateActions'),
            updateBtn: document.getElementById('updateBtn'),
            ignoreUpdateBtn: document.getElementById('ignoreUpdateBtn'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            markedVersion: document.getElementById('markedVersion'),
            advancedToggle: document.getElementById('advancedToggle'),
            advancedSettings: document.getElementById('advancedSettings'),
            advancedArrow: document.getElementById('advancedArrow')
        };
        
        // 加载设置
        async function loadSettings() {
            const [syncResult, localResult] = await Promise.all([
                chrome.storage.sync.get(['outlineVisible', 'theme', 'mode']),
                chrome.storage.local.get(['mdReaderConfig'])
            ]);

            const config = localResult.mdReaderConfig || {};

            document.getElementById('outlineToggle').checked = syncResult.outlineVisible !== false;
            document.getElementById('themeToggle').checked = syncResult.theme === 'dark';
            document.getElementById('autoUpdateToggle').checked = config.autoUpdate !== false;
            document.getElementById('scrollSyncToggle').checked =
                config.outlineOptions?.scrollSync !== false;

            // 更新模式选择器
            const mode = syncResult.mode || 'auto';
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        // 保存设置
        async function saveSettings(key, value) {
            if (['outlineVisible', 'theme', 'mode'].includes(key)) {
                await chrome.storage.sync.set({ [key]: value });
            } else {
                const result = await chrome.storage.local.get('mdReaderConfig');
                const config = result.mdReaderConfig || {};

                if (key === 'autoUpdate') {
                    config.autoUpdate = value;
                } else if (key === 'scrollSync') {
                    config.outlineOptions = config.outlineOptions || {};
                    config.outlineOptions.scrollSync = value;
                }

                await chrome.storage.local.set({ mdReaderConfig: config });
            }
        }
        
        // 显示更新状态
        function showUpdateStatus(type, title, text, showActions = false) {
            elements.updateStatus.className = 'update-status visible';
            elements.updateStatus.classList.add(type);
            elements.updateTitle.textContent = title;
            elements.updateText.textContent = text;
            elements.updateActions.style.display = showActions ? 'flex' : 'none';
            
            const icons = {
                info: '⏳',
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };
            elements.updateIcon.textContent = icons[type] || '📦';
        }
        
        // 隐藏更新状态
        function hideUpdateStatus() {
            elements.updateStatus.classList.remove('visible');
        }
        
        // 更新状态指示器
        function updateStatusIndicator(status, text) {
            elements.statusDot.className = 'status-dot';
            if (status) elements.statusDot.classList.add(status);
            elements.statusText.textContent = text;
        }
        
        // 检查更新
        async function checkForUpdates() {
            if (state.isChecking) return;
            
            state.isChecking = true;
            updateStatusIndicator('updating', '检查中...');
            showUpdateStatus('info', '检查更新中', '正在检查 marked.js 的最新版本...', false);
            
            try {
                // 发送消息给 background script 检查更新
                const response = await chrome.runtime.sendMessage({ action: 'checkUpdate' });
                
                if (response.success) {
                    if (response.updateAvailable) {
                        state.updateAvailable = true;
                        state.markedVersion = response.currentVersion;
                        
                        showUpdateStatus(
                            'warning',
                            '发现新版本',
                            `当前: ${response.currentVersion} → 最新: ${response.latestVersion}`,
                            true
                        );
                        updateStatusIndicator('', '有更新');
                    } else {
                        showUpdateStatus('success', '已是最新版本', `marked.js ${response.currentVersion}`);
                        updateStatusIndicator('', '正常');
                        
                        setTimeout(hideUpdateStatus, 3000);
                    }
                    
                    elements.markedVersion.textContent = `marked.js: ${response.currentVersion}`;
                } else {
                    throw new Error(response.error || '检查失败');
                }
            } catch (error) {
                console.error('检查更新失败:', error);
                showUpdateStatus('error', '检查失败', error.message);
                updateStatusIndicator('error', '错误');
            } finally {
                state.isChecking = false;
            }
        }
        
        // 执行更新
        async function performUpdate() {
            updateStatusIndicator('updating', '更新中...');
            elements.updateBtn.disabled = true;
            elements.updateBtn.textContent = '更新中...';
            
            try {
                const response = await chrome.runtime.sendMessage({ action: 'performUpdate' });
                
                if (response.success) {
                    showUpdateStatus(
                        'success',
                        '更新成功',
                        `已更新到 marked.js ${response.version}`
                    );
                    updateStatusIndicator('', '正常');
                    elements.markedVersion.textContent = `marked.js: ${response.version}`;
                    
                    setTimeout(hideUpdateStatus, 3000);
                } else {
                    throw new Error(response.error || '更新失败');
                }
            } catch (error) {
                console.error('更新失败:', error);
                showUpdateStatus('error', '更新失败', error.message);
                updateStatusIndicator('error', '错误');
            } finally {
                elements.updateBtn.disabled = false;
                elements.updateBtn.textContent = '立即更新';
            }
        }
        
        // 模式选择器事件
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                saveSettings('mode', btn.dataset.mode);
            });
        });

        // 事件监听
        document.getElementById('outlineToggle').addEventListener('change', (e) => {
            saveSettings('outlineVisible', e.target.checked);
        });
        
        document.getElementById('themeToggle').addEventListener('change', (e) => {
            saveSettings('theme', e.target.checked ? 'dark' : 'light');
        });
        
        document.getElementById('autoUpdateToggle').addEventListener('change', (e) => {
            saveSettings('autoUpdate', e.target.checked);
        });
        
        document.getElementById('scrollSyncToggle').addEventListener('change', (e) => {
            saveSettings('scrollSync', e.target.checked);
        });
        
        elements.advancedToggle.addEventListener('click', () => {
            const isVisible = elements.advancedSettings.classList.toggle('visible');
            elements.advancedArrow.textContent = isVisible ? '▲' : '▼';
        });
        
        document.getElementById('checkUpdateBtn').addEventListener('click', checkForUpdates);
        
        elements.updateBtn.addEventListener('click', performUpdate);
        
        elements.ignoreUpdateBtn.addEventListener('click', hideUpdateStatus);
        
        document.getElementById('resetConfigBtn').addEventListener('click', async () => {
            if (confirm('确定要重置所有配置吗？此操作不可撤销。')) {
                await chrome.storage.local.remove(['mdReaderConfig', 'mdReaderVersion']);
                await chrome.storage.sync.remove(['outlineVisible', 'theme', 'mode']);
                loadSettings();
                alert('配置已重置');
            }
        });
        
        // 初始化
        loadSettings();
        checkForUpdates();
    </script>
</body>
</html>
