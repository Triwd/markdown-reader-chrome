<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #24292f;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .header img {
            width: 48px;
            height: 48px;
        }

        .header h1 {
            font-size: 16px;
            margin: 0;
            color: #24292f;
        }

        .header p {
            font-size: 12px;
            color: #57606a;
            margin: 4px 0 0 0;
        }

        .section {
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #57606a;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        .toggle-label {
            color: #24292f;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #0969da;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .info {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #57606a;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background: #f6f8fa;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f3f4f6;
        }

        .footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #d0d7de;
            text-align: center;
            font-size: 11px;
            color: #8c959f;
        }

        /* 模式选择器 */
        .mode-selector {
            display: flex;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 6px 0;
            border: none;
            background: #f6f8fa;
            font-size: 13px;
            color: #57606a;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .mode-btn:not(:last-child) {
            border-right: 1px solid #d0d7de;
        }

        .mode-btn.active {
            background: #0969da;
            color: #fff;
            font-weight: 600;
        }

        .mode-btn:hover:not(.active) {
            background: #eaeef2;
        }

        /* 高级设置 */
        .advanced-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
            color: #0969da;
            font-size: 12px;
        }

        .advanced-toggle:hover {
            text-decoration: underline;
        }

        .advanced-settings {
            display: none;
            padding-top: 8px;
        }

        .advanced-settings.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon48.png" alt="Markdown Reader">
        <div>
            <h1>Markdown Reader</h1>
            <p>优雅的 Markdown 阅读器</p>
        </div>
    </div>

    <div class="section">
        <div class="section-title">设置</div>

        <div class="section-title" style="margin-top:4px;">打开模式</div>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="auto">自动</button>
            <button class="mode-btn" data-mode="ask">询问</button>
            <button class="mode-btn" data-mode="off">关闭</button>
        </div>

        <div class="toggle-group">
            <span class="toggle-label">显示大纲</span>
            <label class="toggle-switch">
                <input type="checkbox" id="outlineToggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-group">
            <span class="toggle-label">暗色主题</span>
            <label class="toggle-switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <div class="advanced-toggle" id="advancedToggle">
            <span>高级设置</span>
            <span id="advancedArrow">▼</span>
        </div>

        <div class="advanced-settings" id="advancedSettings">
            <div class="toggle-group">
                <span class="toggle-label">大纲滚动同步</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="scrollSyncToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div style="margin-top: 8px;">
                <button class="btn" id="resetConfigBtn" style="width: 100%;">重置配置</button>
            </div>
        </div>
    </div>

    <div class="info">
        访问任意 .md 或 .markdown 文件，插件会自动启用 Markdown 阅读器。
    </div>

    <div class="footer">
        <div>Markdown Reader v1.1.0</div>
    </div>

    <script src="js/popup.js"></script>
</body>
</html>
